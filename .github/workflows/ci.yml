name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint · format · types · imports · tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv (Python 3.12)
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Set up Node (pyright runtime)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        # --extra sqlite installs the optional persistence backends
        # (langgraph-checkpoint-sqlite + aiosqlite) so pyright (strict) and pytest
        # check and exercise _persistence.py for real instead of skipping it.
        run: uv sync --extra sqlite

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pyright (strict)
        run: uv run pyright

      - name: Import-linter (Layer 0/1/2 boundaries)
        run: uv run lint-imports

      - name: Pytest (coverage gate >= 85%)
        run: uv run pytest
